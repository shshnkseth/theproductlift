  <style>
    .brand-logo_wrap {
      width: clamp(120px, 14vw, 170px);
      max-width: 42vw;
    }

    .brand-logo_wrap img {
      width: 100%;
      height: auto;
      display: block;
    }
    .work-index {
      width: min(1280px, 96vw);
      margin: 40px auto 96px;
    }

    .index-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin: 0 0 1.6rem;
    }

    .index-title {
      margin: 0;
      font-size: 0.82rem;
      line-height: 1.25;
      letter-spacing: 0.03em;
      font-weight: 500;
      text-transform: uppercase;
      color: var(--muted);
    }

    .breadcrumb-link {
      color: var(--muted);
      text-decoration: none;
      transition: color 220ms ease;
    }

    .breadcrumb-link:hover,
    .breadcrumb-link:focus-visible {
      color: var(--text);
    }

    .breadcrumb-sep {
      margin: 0 0.3rem;
      opacity: 0.7;
    }

    .breadcrumb-current {
      color: #d5deea;
    }

    .index-tools {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: wrap;
    }

    .filter-chip,
    .view-btn {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(20, 25, 31, 0.65);
      color: #d7dee8;
      font: inherit;
      font-size: 0.8rem;
      line-height: 1;
      padding: 0.35rem 0.62rem;
      cursor: pointer;
      transition: background-color 220ms ease, border-color 220ms ease, color 220ms ease;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.45rem;
      margin: 0 0 1.25rem;
    }

    .filter-chip.is-active,
    .view-btn.is-active {
      background: rgba(44, 58, 73, 0.9);
      border-color: #55677a;
      color: #edf3fb;
    }

    .view-toggle {
      display: inline-flex;
      gap: 0.35rem;
      margin-left: 0.25rem;
    }

    .view-btn {
      width: 30px;
      height: 30px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .view-btn svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    .project-grid {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1.5rem;
    }

    .project-grid.is-list {
      grid-template-columns: 1fr;
    }

    .project-card-link {
      display: grid;
      gap: 0.9rem;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      border-radius: var(--radius-2);
      outline: none;
      transition: opacity 220ms ease;
    }

    .project-grid.is-list .project-card-link {
      grid-template-columns: minmax(180px, 240px) 1fr;
      align-items: start;
      gap: 1.15rem;
      border-bottom: 1px solid rgba(55, 67, 83, 0.55);
      padding-bottom: 1.25rem;
    }

    .project-image {
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      border-radius: var(--radius-2);
      border: 1px solid var(--border);
      background: #10161f;
    }

    .project-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1);
      transition: transform 240ms ease;
    }

    .project-meta {
      display: grid;
      gap: 0.45rem;
      text-align: left;
    }

    .project-title {
      margin: 0;
      color: var(--text);
      opacity: 0.92;
      font-size: 1.04rem;
      font-weight: 500;
      line-height: 1.3;
      transition: opacity 240ms ease;
    }

    .project-category {
      margin: 0;
      color: #d3dbe6;
      font-size: 0.9rem;
      line-height: 1.35;
    }

    .project-year {
      margin: 0;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.02em;
    }

    .project-description {
      margin: 0.1rem 0 0;
      color: #c6d1de;
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.32rem;
      margin-top: 0.2rem;
    }

    .project-tag {
      border: 1px solid rgba(70, 82, 99, 0.8);
      border-radius: 999px;
      color: #c8d3e1;
      background: rgba(22, 29, 37, 0.68);
      font-size: 0.72rem;
      line-height: 1;
      padding: 0.24rem 0.45rem;
    }

    .project-card-link:hover .project-image img,
    .project-card-link:focus-visible .project-image img {
      transform: scale(1.03);
    }

    .project-card-link:hover .project-title,
    .project-card-link:focus-visible .project-title {
      opacity: 1;
    }

    .project-card-link:focus-visible {
      box-shadow: 0 0 0 2px #6fb3ff;
    }

    @media (max-width: 991px) {
      .project-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .index-head {
        align-items: flex-start;
      }

      .index-tools {
        width: 100%;
        justify-content: flex-end;
      }

      .work-index {
        margin: 28px auto 72px;
      }

      .project-grid,
      .project-grid.is-list {
        grid-template-columns: 1fr;
        gap: 1.15rem;
      }

      .project-grid.is-list .project-card-link {
        grid-template-columns: 1fr;
      }
    }
  </style>

<script>
(function() {
  'use strict';
  
  function initNavScroll() {
    if (typeof gsap === 'undefined' || typeof ScrollTrigger === 'undefined') return;
    
    gsap.registerPlugin(ScrollTrigger);
    
    const nav = document.querySelector(".nav_component");
    const contain = document.querySelector(".nav_desktop_contain");
    
    if (!nav || !contain) return;
    
    const rem = parseFloat(getComputedStyle(document.documentElement).fontSize);
    const threshold = 2.5 * rem;
    
    // Calculate reduction in rem units
    const currentWidthPx = contain.offsetWidth;
    const currentWidthRem = currentWidthPx / rem;
    const reductionRem = Math.min(currentWidthRem * 0.15, 20); // Reduce by 15% or 20rem max
    const targetWidth = `${currentWidthRem - reductionRem}rem`;
    
    const navTimeline = gsap.timeline({
      scrollTrigger: {
        trigger: document.body,
        start: "top top",
        end: `+=${threshold * 2.5}`,
        scrub: 1,
        invalidateOnRefresh: true,
        onUpdate: (self) => {
          if (self.progress > 0.5) {
            nav.classList.add("u-theme-light");
          } else {
            nav.classList.remove("u-theme-light");
          }
        }
      }
    });
    
    navTimeline.to(contain, { 
      width: targetWidth, 
      ease: "power2.out" 
    }, 0);
    navTimeline.to(contain, { 
      scaleY: 0.94, 
      ease: "power2.out" 
    }, 0);
  }
  
  setTimeout(initNavScroll, 100);
  
  window.addEventListener('load', () => {
    if (typeof ScrollTrigger !== 'undefined') ScrollTrigger.refresh();
  });
  
})();
